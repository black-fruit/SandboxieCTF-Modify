name: Verify Patches

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  verify-and-package:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Verify patches applied
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Verifying Certificate Bypass Patches"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""

        PASS=0
        FAIL=0

        # Test 1: KphSetFakeCertificate
        if grep -q "KphSetFakeCertificate" Sandboxie-Plus/Sandboxie/core/drv/verify.c; then
          echo "✅ Test 1: KphSetFakeCertificate function found"
          ((PASS++))
        else
          echo "❌ Test 1: KphSetFakeCertificate function NOT found"
          ((FAIL++))
        fi

        # Test 2: opt_sec bypass
        if grep -q "Verify_CertInfo.opt_sec = 1" Sandboxie-Plus/Sandboxie/core/drv/verify.c; then
          echo "✅ Test 2: opt_sec bypass found"
          ((PASS++))
        else
          echo "❌ Test 2: opt_sec bypass NOT found"
          ((FAIL++))
        fi

        # Test 3: opt_enc bypass
        if grep -q "Verify_CertInfo.opt_enc = 1" Sandboxie-Plus/Sandboxie/core/drv/verify.c; then
          echo "✅ Test 3: opt_enc bypass found"
          ((PASS++))
        else
          echo "❌ Test 3: opt_enc bypass NOT found"
          ((FAIL++))
        fi

        # Test 4: opt_net bypass
        if grep -q "Verify_CertInfo.opt_net = 1" Sandboxie-Plus/Sandboxie/core/drv/verify.c; then
          echo "✅ Test 4: opt_net bypass found"
          ((PASS++))
        else
          echo "❌ Test 4: opt_net bypass NOT found"
          ((FAIL++))
        fi

        # Test 5: Process certificate checks bypassed
        if grep -q "if (0) { // CTF" Sandboxie-Plus/Sandboxie/core/drv/process.c; then
          echo "✅ Test 5: process.c certificate checks bypassed"
          ((PASS++))
        else
          echo "❌ Test 5: process.c certificate checks NOT bypassed"
          ((FAIL++))
        fi

        # Test 6: 5-minute timer bypassed
        if grep -q "CTF: Bypass" Sandboxie-Plus/Sandboxie/core/drv/process.c; then
          echo "✅ Test 6: 5-minute process kill timer bypassed"
          ((PASS++))
        else
          echo "❌ Test 6: 5-minute process kill timer NOT bypassed"
          ((FAIL++))
        fi

        # Test 7: GUI bypass
        if grep -q "// CTF: Always pass certificate check in GUI" Sandboxie-Plus/SandboxiePlus/SandMan/SandMan.cpp; then
          echo "✅ Test 7: GUI certificate check bypassed"
          ((PASS++))
        else
          echo "❌ Test 7: GUI certificate check NOT bypassed"
          ((FAIL++))
        fi

        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Results: $PASS passed, $FAIL failed"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        if [ $FAIL -ne 0 ]; then
          exit 1
        fi

    - name: Package patched source
      run: |
        mkdir -p artifacts

        # Create a clean source package
        tar -czf artifacts/sandboxie-plus-patched-source.tar.gz \
          Sandboxie-Plus/ \
          README.md \
          SOLUTION.md \
          WINDOWS_BUILD_GUIDE.md \
          patcher.py \
          manual_patch_guide.md \
          verify_patches.sh \
          build_patched.bat \
          install_patched.bat

        # Copy key patched files
        mkdir -p artifacts/patched_files
        cp Sandboxie-Plus/Sandboxie/core/drv/verify.c artifacts/patched_files/
        cp Sandboxie-Plus/Sandboxie/core/drv/process.c artifacts/patched_files/
        cp Sandboxie-Plus/SandboxiePlus/SandMan/SandMan.cpp artifacts/patched_files/

        ls -lh artifacts/

    - name: Create README
      run: |
        cat > artifacts/README.txt << 'EOF'
        Sandboxie-Plus Certificate Bypass - CTF Challenge
        ==================================================

        ✅ All patches verified and applied!

        This package contains:
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        📦 sandboxie-plus-patched-source.tar.gz
           Complete source code with all patches applied

        📄 patched_files/
           Individual patched source files:
           - verify.c (kernel certificate bypass)
           - process.c (process restrictions bypass)
           - SandMan.cpp (GUI checks bypass)

        🔓 Unlocked Features:
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        ✅ Security Enhanced (opt_sec)
           • UseSecurityMode, SysCallLockDown
           • RestrictDevices, UsePrivacyMode
           • ProtectHostImages, NoSecurityIsolation

        ✅ Encrypted Sandbox (opt_enc)
           • ConfidentialBox (full encryption)
           • UseFileImage, EnableEFS

        ✅ Advanced Network (opt_net)
           • NetworkDnsFilter, NetworkUseProxy

        ✅ Desktop Isolation (opt_desk)
           • UseSandboxDesktop

        🛠️  How to Build on Windows:
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        Prerequisites:
        1. Visual Studio 2019 or 2022
        2. Windows 10/11 SDK
        3. Windows Driver Kit (WDK) - for kernel driver
        4. Qt 6.5.x Framework
        5. CMake (optional)

        Build Steps:
        1. Extract sandboxie-plus-patched-source.tar.gz
        2. See WINDOWS_BUILD_GUIDE.md for detailed instructions
        3. Or run build_patched.bat in Developer Command Prompt

        Quick Build:
        ───────────────────────────────────────────────────────────
        # Kernel Driver
        cd Sandboxie-Plus\Sandboxie
        msbuild SandboxDrv.sln /p:Configuration=Release /p:Platform=x64

        # Service
        msbuild Sandbox.sln /p:Configuration=Release /p:Platform=x64

        # GUI
        cd ..\SandboxiePlus
        qmake SandboxiePlus.pro
        nmake release

        📥 Installation:
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        1. Stop service: net stop SbieSvc
        2. Backup files in C:\Program Files\Sandboxie-Plus\
        3. Replace:
           - SbieDrv.sys (kernel driver)
           - SbieSvc.exe (service)
           - SandMan.exe (GUI)
        4. Enable test signing: bcdedit /set testsigning on
        5. Reboot
        6. Start service: net start SbieSvc

        ⚠️  Important Notes:
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        - For educational/CTF purposes only
        - Patched driver is unsigned (requires test signing)
        - All three files must be replaced for full functionality
        - Disable Windows Defender during installation

        📚 Documentation:
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        - WINDOWS_BUILD_GUIDE.md - Complete build guide (Chinese)
        - SOLUTION.md - Technical implementation details
        - README.md - Project overview

        🏆 Verification:
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        After installation, in SandMan GUI:
        1. Go to Help → About
        2. Certificate Status should show: Active
        3. Certificate Level should show: MAXLEVEL
        4. All premium features should be enabled

        💡 Support:
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        If you find Sandboxie-Plus useful, please support the
        original developers: https://sandboxie-plus.com/

        Repository: https://github.com/black-fruit/SandboxieCTF-Modify
        EOF

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Sandboxie-Plus-Patched-Source
        path: artifacts/
        retention-days: 90

    - name: Summary
      run: |
        echo "## ✅ Patch Verification Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "All certificate bypass patches verified!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Complete patched source code" >> $GITHUB_STEP_SUMMARY
        echo "- Individual patched files" >> $GITHUB_STEP_SUMMARY
        echo "- Build and installation guides" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔓 Unlocked Features" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Security Enhanced (opt_sec)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Encrypted Sandbox (opt_enc)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Advanced Network (opt_net)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Desktop Isolation (opt_desk)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download artifacts and build on Windows with Visual Studio + WDK" >> $GITHUB_STEP_SUMMARY
